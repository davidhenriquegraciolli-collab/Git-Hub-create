<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVibe Pro | Universo Musical</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #1a0b2e;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background-color: #0d0518;
            border-right: 1px solid #3d1d6d;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        aside .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #bf55ec;
        }

        aside nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-btn {
            display: block;
            text-decoration: none;
            color: #b3a2c7;
            padding: 0.8rem 1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background-color: #261142;
            color: white;
            border-left: 4px solid #bf55ec;
        }

        main {
            flex: 1;
            padding: 2.5rem;
        }
    </style>
</head>

    <body>

        <aside>
            <div class="logo">🎧 MyVibe Pro</div>

            </main>

    </body>

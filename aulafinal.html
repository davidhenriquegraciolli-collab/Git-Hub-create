<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVibe | Contato - Feedback</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #1a0b2e;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex; /* Alinha o menu e a área do formulário lado a lado */
        }

        /* MENU LATERAL FIXO */
        .sidebar {
            width: 250px;
            background-color: #0d0518;
            border-right: 2px solid #3d1d6d;
            padding: 2rem 1.5rem;
            height: 100vh;
            position: fixed; /* Mantém o menu preso na tela */
            left: 0;
            top: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e1bee7;
            margin-bottom: 2.5rem;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .menu-btn {
            color: #b3a2c7;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            transition: 0.3s;
        }

        .menu-btn:hover {
            color: #bf55ec;
            padding-left: 5px;
        }

        /* CONTEÚDO PRINCIPAL (DIREITA) */
        .main-container {
            flex: 1;
            margin-left: 250px; /* Evita que o formulário passe por baixo do menu */
            padding: 2rem 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e1bee7;
        }

        header p {
            color: #b3a2c7;
        }

        form-box {
            width: 100%;
            max-width: 550px;
            background: #0d0518;
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #3d1d6d;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #e1bee7;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 2px solid #3d1d6d;
            background: #130722;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #bf55ec;
        }

        .estrelas {
            display: flex;
            gap: 8px;
            font-size: 32px;
            cursor: pointer;
            user-select: none;
            margin-top: 10px;
        }

        .estrelas span {
            color: #3d1d6d;
            transition: 0.2s;
        }

        .estrelas span.ativo {
            color: #bf55ec;
            transform: scale(1.1);
            text-shadow: 0 0 10px #bf55ec;
        }

        .estrelas span:hover {
            transform: scale(1.2);
            color: #e1bee7;
        }

        button {
            margin-top: 25px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #4d1c8c, #bf55ec);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Esconde as seções condicionais por padrão */
        #porqueRuim, #perguntaAnuncio, #perguntaUsoDiario {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #5c437a;
            width: 100%;
        }

        /* Responsividade para celulares */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 2px solid #3d1d6d;
                padding: 1.5rem;
            }
            .main-container {
                margin-left: 0;
                padding: 2rem 3%;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR INTEGRADA À ESQUERDA -->
    <aside class="sidebar">
        <div class="logo">🎧 MyVibe Pro</div>
        <nav class="nav-menu">
            <a href="aula1.html" class="menu-btn">🏠 Início</a>
            <a href="aula2.html" class="menu-btn">🔍 Mundo Musical</a>
            <a href="aula3.html" class="menu-btn">🎵 Minhas Playlists</a>
            <a href="aula4.html" class="menu-btn">👨‍🎤 Coleção de Artistas</a>
            <a href="aulafinal.html" class="menu-btn">📩 Enviar Feedback</a>
        </nav>
    </aside>

    <!-- ÁREA DO FORMULÁRIO (DIREITA) -->
    <div class="main-container">
        <header>
            <h1>📩 Enviar Feedback</h1>
            <p>Ajude-nos a melhorar sua experiência musical</p>
        </header>

        <!-- Elemento form-box para envelopar o design sem conflito semântico -->
        <div class="form-box">
            <form id="feedbackForm">

                <label>Nome</label>
                <input type="text" required placeholder="Digite seu nome">

                <label>Idade</label>
                <input type="number" min="1" required placeholder="Digite sua idade">

                <!-- PERGUNTAS SOBRE MÚSICA -->
                <label>Você gosta de ouvir músicas?</label>
                <select id="gostaMusica" required>
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                    <option value="Nao muito">Não muito</option>
                </select>

                <label>Com qual frequência você escuta músicas?</label>
                <select id="frequenciaMusica" required>
                    <option value="">Selecione</option>
                    <option value="sempre">O dia todo / Sempre que posso</option>
                    <option value="diariamente">Diariamente</option>
                    <option value="asvezes">Às vezes na semana</option>
                    <option value="raramente">Raramente</option>
                </select>

                <!-- PERGUNTA PRINCIPAL DE AVALIAÇÃO -->
                <label>Como você avalia esse aplicativo?</label>
                <select id="avaliacao" onchange="verificarAvaliacao()" required>
                    <option value="">Selecione</option>
                    <option value="bom">Bom</option>
                    <option value="interessante">Interessante</option>
                    <option value="ruim">Ruim</option>
                </select>
            
                <!-- APARECE SOMENTE SE FOR "BOM" -->
                <div id="perguntaAnuncio">
                    <label>Está tendo anúncio durante o uso?</label>
                    <select id="temAnuncio">
                        <option value="">Selecione</option>
                        <option value="sim">Sim, muitos anúncios</option>
                        <option value="nao">Não, navegação limpa</option>
                        <option value="asvezes">Às vezes</option>
                    </select>
                </div>

                <!-- APARECE SOMENTE SE FOR "INTERESSANTE" -->
                <div id="perguntaUsoDiario">
                    <label>Você usaria todos os dias?</label>
                    <select id="usariaTodoDia">
                        <option value="">Selecione</option>
                        <option value="sim">Com certeza</option>
                        <option value="talvez">Talvez</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <!-- APARECE SOMENTE SE FOR "RUIM" -->
                <div id="porqueRuim">
                    <label>Por que você achou ruim?</label>
                    <textarea placeholder="Explique o motivo..."></textarea>

                    <label>Como posso melhorar esse aplicativo?</label>
                    <textarea rows="4" placeholder="Dê sugestões de melhoria..."></textarea>
                </div>

                <!-- QUESTÃO DE 5 ESTRELAS -->
                <label>Dê uma nota em estrelas para o aplicativo:</label>
                <div class="estrelas" id="containerEstrelas">
                    <span data-value="1">★</span>
                    <span data-value="2">★</span>
                    <span data-value="3">★</span>
                    <span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>

                <input type="hidden" id="notaEstrelas" name="notaEstrelas" required>

                <button type="submit">Enviar Feedback</button>
            </form>
        </div>

        <footer>
            <p>&copy; 2026 MyVibe</p>
        </footer>
    </div>

<script>
    function verificarAvaliacao() {
        const valor = document.getElementById("avaliacao").value;
        
        const campoRuim = document.getElementById("porqueRuim");
        const campoAnuncio = document.getElementById("perguntaAnuncio");
        const campoUsoDiario = document.getElementById("perguntaUsoDiario");
        
        const selectAnuncio = document.getElementById("temAnuncio");

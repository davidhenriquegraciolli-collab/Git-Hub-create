<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFinder | Pesquisa Global de Músicas</title>
    
    <style>
        /* ==================== ESTILIZAÇÃO CSS ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #1a0b2e; /* Fundo roxo escuro profundo */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* CONTAINER CENTRAL DE BUSCA */
        .search-wrapper {
            width: 100%;
            max-width: 650px;
            background-color: #0d0518; /* Roxo quase preto */
            border: 2px solid #3d1d6d;
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-area {
            font-size: 2.5rem;
            font-weight: bold;
            color: #bf55ec; /* Roxo neon */
            text-shadow: 0 0 15px rgba(191, 85, 236, 0.6);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #b3a2c7;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        /* FORMULÁRIO E INPUT */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 30px;
            border: 2px solid #3d1d6d;
            background-color: #130722;
            color: #ffffff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-input:focus {
            border-color: #bf55ec;
            box-shadow: 0 0 15px rgba(191, 85, 236, 0.3);
            background-color: #1a0b2e;
        }

        /* BOTÃO PRINCIPAL */
        .main-search-btn {
            background: linear-gradient(135deg, #4d1c8c 0%, #bf55ec 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(191, 85, 236, 0.2);
        }

        .main-search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(191, 85, 236, 0.5);
        }

        /* DIVISOR */
        .divider {
            margin: 2rem 0 1.5rem 0;
            border-top: 1px solid #3d1d6d;
            position: relative;
        }

        .divider span {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0d0518;
            padding: 0 10px;
            color: #5c437a;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* RECURSOS ADICIONAIS (ATALHOS) */
        .shortcut-text {
            color: #b3a2c7;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .shortcut-btn {
            background-color: #130722;
            border: 1px solid #3d1d6d;
            color: #e1bee7;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .shortcut-btn:hover {
            background-color: #261142;
            border-color: #bf55ec;
            color: #ffffff;
        }

        @media (max-width: 480px) {
            .shortcut-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="search-wrapper">
        <div class="logo-area">🔍 MusicFinder</div>
        <p class="subtitle">Digite o nome da música, trecho ou artista para pesquisar em toda a web.</p>
        
        <!-- Formulário de Busca Principal (YouTube) -->
        <form action="https://youtube.com" method="GET" target="_blank" class="search-form">
            <div class="input-container">
                <input type="text" id="musicQuery" name="search_query" placeholder="Ex: Nome da Música ou Artista..." class="search-input" required>
            </div>
            <button type="submit" class="main-search-btn">Pesquisar Música</button>
        </form>

        <div class="divider">
            <span>Ou busque por</span>
        </div>

        <p class="shortcut-text">Encontre conteúdos específicos em outros sites parceiros:</p>
        
        <!-- Atalhos Específicos usando JavaScript direto nos botões -->
        <div class="shortcut-grid">
            <button type="button" class="shortcut-btn" onclick="buscarEspecial('letra')">📝 Letra</button>
            <button type="button" class="shortcut-btn" onclick="buscarEspecial('traducao')">🌐 Tradução</button>
            <button type="button" class="shortcut-btn" onclick="buscarEspecial('cifra')">🎸 Cifra / Notas</button>
        </div>
    </div>

    <!-- ==================== LOGICA DE REDIRECIONAMENTO ==================== -->
    <script>
        function buscarEspecial(tipo) {
            var termo = document.getElementById('musicQuery').value.trim();
            
            if (termo === "") {
                alert("Por favor, digite o nome de uma música ou artista primeiro!");
                document.getElementById('musicQuery').focus();
                return;
            }

            var url = "";
            
            if (tipo === 'letra') {
                // Abre a busca de letras direto no Google
                url = "https://google.com" + encodeURIComponent(termo + " letra");
            } else if (tipo === 'traducao') {
                // Abre a busca de tradução direto no Google
                url = "https://google.com" + encodeURIComponent(termo + " traducao");
            } else if (tipo === 'cifra') {
                // Abre a busca de cifras direto no Cifra Club / Google
                url = "https://google.com" + encodeURIComponent(termo + " cifra");
            }

            // Abre o resultado em uma nova aba sem quebrar nada no site
            window.open(url, '_blank');
        }
    </script>

</body>
</html>

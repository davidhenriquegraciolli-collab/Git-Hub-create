<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFinder | Pesquisa Global de Músicas</title>
    
    <!-- Ícones modernos para o menu -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Estrutura principal dividida em duas colunas */
        body {
            background-color: #1a0b2e;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Menu Lateral (Aside) */
        aside {
            width: 260px;
            background-color: #0d0518;
            border-right: 1px solid #3d1d6d;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            flex-shrink: 0; /* Impede o menu de espremer */
        }

        aside .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #bf55ec;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-left: 0.5rem;
        }

        aside nav {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: #b3a2c7;
            padding: 0.9rem 1.2rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .menu-btn i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .menu-btn:hover {
            background-color: #261142;
            color: #ffffff;
            border-left-color: #bf55ec;
            padding-left: 1.5rem;
        }

        /* Destaque para a página atual (Music Finder) */
        .menu-btn.active {
            background: linear-gradient(90deg, #261142 0%, #0d0518 100%);
            color: #bf55ec;
            border-left-color: #bf55ec;
        }

        /* Área de Conteúdo Direita */
        main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        /* Seção da Caixa de Pesquisa */
        .search-wrapper {
            width: 100%;
            max-width: 650px;
            background-color: #0d0518;
            border: 2px solid #3d1d6d;
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
        }

        .logo-area {
            font-size: 2.5rem;
            font-weight: bold;
            color: #bf55ec;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #b3a2c7;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .search-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 30px;
            border: 2px solid #3d1d6d;
            background-color: #130722;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .search-input:focus {
            border-color: #bf55ec;
        }

        .main-search-btn {
            background: linear-gradient(135deg, #4d1c8c, #bf55ec);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .main-search-btn:hover {
            opacity: 0.9;
        }

        .divider {
            margin: 2rem 0;
            border-top: 1px solid #3d1d6d;
            position: relative;
        }

        .divider span {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0d0518;
            padding: 0 10px;
            color: #5c437a;
            font-size: 0.85rem;
        }

        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .shortcut-btn {
            display: block;
            text-align: center;
            background-color: #130722;
            border: 1px solid #3d1d6d;
            color: #e1bee7;
            padding: 0.75rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .shortcut-btn:hover {
            background-color: #261142;
            border-color: #bf55ec;
            color: #fff;
        }
    </style>
</head>

<!-- CONTEÚDO PRINCIPAL (MusicFinder) -->
<main>
    <div class="search-wrapper">
        <div class="logo-area">🔍 MusicFinder</div>
        <p class="subtitle">Digite o nome da música, trecho ou artista.</p>

        <form action="https://youtube.com" method="GET" target="_blank" class="search-form">
            <input type="text" id="musicQuery" name="search_query" class="search-input" placeholder="Ex: música..." required>
            <button type="submit" class="main-search-btn">Pesquisar</button>
        </form>

        <div class="divider">
            <span>Ou busque por</span>
        </div>

        <div class="shortcut-grid">
            <a href="javascript:buscarEspecial('letra')" class="shortcut-btn">📝 Letra</a>
            <a href="javascript:buscarEspecial('traducao')" class="shortcut-btn">🌐 Tradução</a>
            <a href="javascript:buscarEspecial('cifra')" class="shortcut-btn">🎸 Cifra</a>
        </div>
    </div>
</main>

<!-- SCRIPT MANTIDO E FUNCIONAL -->
<script>
function buscarEspecial(tipo) {
    var termo = document.getElementById('musicQuery').value.trim();

    if (!termo) {
        alert("Digite uma música primeiro!");
        return;
    }

    var url = "";

    if (tipo === 'letra') {
        url = "https://www.google.com/search?q=" + encodeURIComponent(termo + " letra");
    } else if (tipo === 'traducao') {
        url = "https://www.google.com/search?q=" + encodeURIComponent(termo + " traducao");
    } else if (tipo === 'cifra') {
        url = "https://www.google.com/search?q=" + encodeURIComponent(termo + " cifra");
    }

    window.open(url, '_blank');
}


</script>

</body>

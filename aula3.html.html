<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Playlists | MyVibe Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1a0b2e; color: #ffffff; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 260px; background-color: #0d0518; border-right: 1px solid #3d1d6d; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 2.5rem; flex-shrink: 0; }
        aside .logo { font-size: 1.6rem; font-weight: bold; color: #bf55ec; display: flex; align-items: center; gap: 0.5rem; padding-left: 0.5rem; }
        aside nav { display: flex; flex-direction: column; gap: 0.7rem; }
        .menu-btn { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: #b3a2c7; padding: 0.9rem 1.2rem; font-weight: 600; border-radius: 8px; transition: all 0.3s ease; border-left: 4px solid transparent; }
        .menu-btn:hover { background-color: #261142; color: #ffffff; border-left-color: #bf55ec; padding-left: 1.5rem; }
        .menu-btn.active { background: linear-gradient(90deg, #261142 0%, #0d0518 100%); color: #bf55ec; border-left-color: #bf55ec; }
        
        main { flex: 1; padding: 2.5rem; overflow-y: auto; }
        h1 { margin-bottom: 1.5rem; color: #fff; }
        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .playlist-card { background-color: #0d0518; border: 1px solid #3d1d6d; padding: 1.5rem; border-radius: 12px; text-align: center; transition: transform 0.2s; }
        .playlist-card:hover { transform: translateY(-5px); border-color: #bf55ec; }
        .playlist-cover { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
        .playlist-title { font-weight: bold; margin-bottom: 0.5rem; }
        .playlist-tracks { color: #b3a2c7; font-size: 0.85rem; margin-bottom: 1rem; }
        .play-btn { background-color: #bf55ec; color: white; border: none; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">🎧 MyVibe Pro</div>
        <nav>
            <a href="index.html" class="menu-btn">🏠 Início</a>
            <a href="aula2.html" class="menu-btn">🔍 Music Finder</a>
            <a href="aula3.html" class="menu-btn active">🎵 Minhas Playlists</a>
            <a href="aula4.html" class="menu-btn">👨‍🎤 Artistas</a>
            <a href="aulafinal.html" class="menu-btn">📩 Feedback</a>
        </nav>
    </aside>

    <main>
        <h1>Minhas Playlists</h1>
        <div class="playlist-grid">
            <div class="playlist-card">
                <span class="playlist-cover">🔥</span>
                <div class="playlist-title">Foco Total</div>
                <div class="playlist-tracks">32 músicas</div>
                <button class="play-btn" onclick="alert('Tocando Foco Total!')">Dar Play</button>
            </div>
            <div class="playlist-card">
                <span class="playlist-cover">☕</span>
                <div class="playlist-title">Chill Vibes</div>
                <div class="playlist-tracks">18 músicas</div>
                <button class="play-btn" onclick="alert('Tocando Chill Vibes!')">Dar Play</button>
            </div>
            <div class="playlist-card">
                <span class="playlist-cover">⚡</span>
                <div class="playlist-title">Treino Hard</div>
                <div class="playlist-tracks">25 músicas</div>
                <button class="play-btn" onclick="alert('Tocando Treino Hard!')">Dar Play</button>
            </div>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVibe | Minhas Playlists</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #1a0b2e;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 5%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e1bee7;
        }

        header p {
            color: #b3a2c7;
            margin-bottom: 1.5rem;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 2rem auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            border: 2px solid #3d1d6d;
            background-color: #0d0518;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: #bf55ec;
        }

        .search-btn {
            background: linear-gradient(135deg, #4d1c8c, #bf55ec);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .playlist-card {
            background-color: #0d0518;
            border: 2px solid #3d1d6d;
            border-radius: 16px;
            padding: 1.5rem;
            transition: 0.3s;
        }

        .playlist-card:hover {
            transform: translateY(-5px);
            border-color: #bf55ec;
        }

        .embed-container {
            background-color: #130722;
            width: 100%;
            height: 350px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .playlist-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #4d1c8c, #bf55ec);
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>🎵 MyVibe</h1>
    <p>Acesse e busque suas músicas favoritas</p>
    
    <form class="search-container" action="https://youtube.com" method="get" target="_blank">
        <input type="text" name="search_query" class="search-input" placeholder="Buscar músicas ou artistas..." required>
        <button type="submit" class="search-btn">Buscar</button>
    </form>
</header>

<main class="playlist-grid">

    <!-- PLAYLIST 1 -->
    <div class="playlist-card">
        <h3>☕ Deep Focus</h3>
        <span>Concentração total</span>

        <div class="embed-container">
            <iframe src="https://youtube.com" allowfullscreen></iframe>
        </div>

        <!-- Atualizado para buscar o termo no YouTube -->
        <a href="https://youtube.com?search_query=Deep+Focus+Playlist" target="_blank" class="playlist-btn">
            Procurar no YouTube
        </a>
    </div>

    <!-- PLAYLIST 2 -->
    <div class="playlist-card">
        <h3>⚡ Beast Mode</h3>
        <span>Treino pesado</span>

        <div class="embed-container">
            <iframe src="https://youtube.com" allowfullscreen></iframe>
        </div>

        <!-- Atualizado para buscar o termo no YouTube -->
        <a href="https://youtube.com?search_query=Beast+Mode+Workout+Playlist" target="_blank" class="playlist-btn">
            Procurar no YouTube
        </a>
    </div>

    <!-- PLAYLIST 3 -->
    <div class="playlist-card">
        <h3>🌙 Chill Vibes</h3>
        <span>Relaxar</span>

        <div class="embed-container">
            <iframe src="https://youtube.com" allowfullscreen></iframe>
        </div>

        <!-- Mantido o padrão de busca no YouTube -->
        <a href="https://youtube.com?search_query=Chill+Vibes+Playlist" target="_blank" class="playlist-btn">
            Procurar no YouTube
        </a>
    </div>

</main>

<footer style="text-align:center; margin-top:4rem; color:#5c437a;">
    <p>&copy; 2026 MyVibe</p>
</footer>

</body>
</html>
